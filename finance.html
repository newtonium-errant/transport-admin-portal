<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRTS - Finance</title>
    <link href="css/shared-styles.css" rel="stylesheet">
    <script src="js/auth/permissions.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --color-primary: #1B4332;
            --color-accent: #2D6A4F;
            --color-white: #FFFFFF;
            --color-black: #000000;
            --color-gray-light: #E5E5E5;
            --color-gray-dark: #333333;
            --color-success: #27ae60;
            --color-warning: #f39c12;
            --color-danger: #e74c3c;
        }

        body {
            padding-top: 70px;
            background-color: #f5f7fa;
        }

        /* ========== Header ========== */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: var(--color-primary);
            color: var(--color-white);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            z-index: 1000;
        }

        .header-container {
            max-width: 100%;
            height: 100%;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--color-white);
            font-weight: 600;
            font-size: 1.3em;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .header-brand:hover { opacity: 0.9; }

        .brand-icon { font-size: 1.8em; line-height: 1; }
        .brand-text { font-weight: 700; letter-spacing: 0.5px; }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }

        .nav-link {
            color: var(--color-white);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-link:hover {
            background-color: var(--color-accent);
            color: var(--color-white);
        }

        .nav-link.active {
            background-color: var(--color-accent);
            color: var(--color-white);
            font-weight: 600;
        }

        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--color-accent);
            color: var(--color-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9em;
        }

        .user-name-link {
            color: var(--color-white);
            text-decoration: none;
            transition: opacity 0.2s;
            font-weight: 500;
            margin-right: 8px;
        }

        .user-name-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .user-role-badge {
            background-color: var(--color-accent);
            color: var(--color-white);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: capitalize;
        }

        .logout-btn {
            background-color: transparent;
            color: var(--color-white);
            border: 1px solid var(--color-white);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background-color: var(--color-white);
            color: var(--color-primary);
        }

        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--color-white);
            font-size: 1.5em;
            cursor: pointer;
            padding: 8px;
        }

        @media (max-width: 992px) {
            .header-container { padding: 0 20px; }
            .user-name-link { display: none; }
            .logout-btn span { display: none; }
            .nav-link { padding: 8px 12px; font-size: 0.9em; }
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle { display: block; }
            .header-nav {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 250px;
                height: calc(100vh - 70px);
                background-color: var(--color-primary);
                flex-direction: column;
                align-items: flex-start;
                padding: 20px;
                gap: 10px;
                transition: left 0.3s;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.15);
            }
            .header-nav.mobile-open { left: 0; }
            .nav-link { width: 100%; padding: 12px 16px; }
            .brand-text { font-size: 0.9em; }
            .user-role-badge { display: none; }
            .payroll-summary-nums { gap: 8px !important; font-size: 0.8em; }
        }

        /* ========== Finance Tabs ========== */
        #financeTabs .nav-link {
            color: var(--color-gray-dark);
            font-weight: 500;
        }

        #financeTabs .nav-link.active {
            color: var(--color-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--color-primary);
            background: transparent;
        }

        #financeTabs .nav-link:hover {
            color: var(--color-accent);
            background: transparent;
        }

        /* ========== Skeleton Loaders ========== */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ========== Review Tab ========== */
        .review-clickable {
            cursor: pointer;
        }

        .review-clickable:hover {
            background-color: #f0f8f5;
        }

        #bulkActionBar {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 10px 16px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        /* ========== Payroll Tab ========== */
        .pay-period-btn {
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            background: transparent;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pay-period-btn:hover,
        .pay-period-btn.active {
            background: var(--color-accent);
            color: var(--color-white);
        }

        .driver-payroll-card .card-body {
            cursor: pointer;
        }

        .collapse-icon {
            transition: transform 0.2s;
            font-size: 0.85em;
        }

        .payroll-summary-nums span {
            min-width: 70px;
        }

        .cursor-pointer {
            cursor: pointer;
        }

        /* CRA badges */
        .cra-badge {
            font-size: 0.75em;
            font-weight: 600;
        }

        /* Trip type badges */
        .trip-standard { background: #d4edda; color: #155724; }
        .trip-oneway { background: #fff3cd; color: #856404; }
        .trip-overtime { background: #f8d7da; color: #721c24; }

        /* Staff mileage entries */
        .staff-mileage-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .staff-mileage-entry:last-child {
            border-bottom: none !important;
        }

        #customPeriodRange {
            display: none;
        }

        /* ========== Invoicing Tab ========== */
        .invoice-badge-created {
            background: #cfe2ff;
            color: #084298;
        }

        .invoice-badge-sent {
            background: #fff3cd;
            color: #664d03;
        }

        .invoice-badge-paid {
            background: #d1e7dd;
            color: #0f5132;
        }

        .invoice-badge-void {
            background: #f8d7da;
            color: #842029;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
        }

        .sortable:hover {
            background-color: #f0f0f0;
        }

        /* ========== Toast Container ========== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }

        /* ========== Empty State ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        /* ========== Print Styles ========== */
        @media print {
            .app-header,
            .mobile-menu-toggle,
            .toast-container,
            #financeTabs,
            .pay-period-selector,
            .btn,
            .bulk-action-bar {
                display: none !important;
            }

            body {
                padding-top: 0;
                background: white;
            }

            .tab-pane {
                display: block !important;
                opacity: 1 !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-container">
            <div class="header-brand" onclick="window.location.href='dashboard.html'">
                <span class="brand-icon"><i class="bi bi-truck"></i></span>
                <span class="brand-text">RRTS</span>
            </div>

            <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
                <i class="bi bi-list"></i>
            </button>

            <nav class="header-nav" id="mainNav"></nav>

            <div class="header-user">
                <div class="user-info">
                    <span class="user-avatar" id="userAvatar">--</span>
                    <a href="profile.html" class="user-name-link" id="userName">User</a>
                    <span class="user-role-badge" id="userRoleBadge">Guest</span>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container-fluid my-4 px-4">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2><i class="bi bi-currency-dollar"></i> Finance</h2>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="financeTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-review" data-bs-toggle="tab" data-bs-target="#pane-review" type="button" role="tab">
                    Appointment Review <span class="badge bg-warning text-dark" id="reviewCount" style="display: none;"></span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-payroll" data-bs-toggle="tab" data-bs-target="#pane-payroll" type="button" role="tab">
                    Payroll
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-invoicing" data-bs-toggle="tab" data-bs-target="#pane-invoicing" type="button" role="tab">
                    Invoicing
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="financeTabContent">

            <!-- ==================== TAB 1: APPOINTMENT REVIEW ==================== -->
            <div class="tab-pane fade show active" id="pane-review" role="tabpanel">
                <!-- Filter Bar -->
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-2">
                                <label class="form-label small mb-1">From Date</label>
                                <input type="date" class="form-control form-control-sm" id="reviewDateFrom">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small mb-1">To Date</label>
                                <input type="date" class="form-control form-control-sm" id="reviewDateTo">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small mb-1">Driver</label>
                                <select class="form-select form-select-sm" id="reviewDriverFilter">
                                    <option value="">All Drivers</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small mb-1">Client</label>
                                <select class="form-select form-select-sm" id="reviewClientFilter">
                                    <option value="">All Clients</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <div class="d-flex gap-1">
                                    <button class="btn btn-primary btn-sm" id="btnReviewFilter"><i class="bi bi-funnel"></i> Filter</button>
                                    <button class="btn btn-outline-secondary btn-sm" id="btnReviewClearFilter"><i class="bi bi-x"></i> Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bulk Action Bar -->
                <div id="bulkActionBar" class="mb-3">
                    <button class="btn btn-success btn-sm" id="btnBulkApprove">
                        <i class="bi bi-check-all"></i> Approve Selected (<span id="bulkSelectedCount">0</span>)
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnClearSelection">Clear Selection</button>
                </div>

                <!-- Skeleton -->
                <div id="reviewSkeleton" style="display: none;">
                    <div class="card"><div class="card-body">
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%;"></div>
                    </div></div>
                </div>

                <!-- Review Table -->
                <div id="reviewContent">
                    <div class="card">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th style="width: 40px;">
                                            <input type="checkbox" class="form-check-input" id="reviewSelectAll" title="Select All">
                                        </th>
                                        <th>Date</th>
                                        <th>Client</th>
                                        <th>Driver</th>
                                        <th>Type</th>
                                        <th>Duration</th>
                                        <th>Mileage</th>
                                        <th>Billed</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="reviewTableBody">
                                    <tr><td colspan="10" class="text-center py-4 text-muted">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ==================== TAB 2: PAYROLL ==================== -->
            <div class="tab-pane fade" id="pane-payroll" role="tabpanel">
                <!-- Pay Period Selector -->
                <div class="card mb-3">
                    <div class="card-body py-2">
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="fw-bold me-2">Pay Period:</span>
                            <button class="pay-period-btn active" id="btnPeriodPrevious">Previous</button>
                            <button class="pay-period-btn" id="btnPeriodCurrent">Current</button>
                            <button class="pay-period-btn" id="btnPeriodNext">Next</button>
                            <button class="pay-period-btn" id="btnPeriodYTD">YTD</button>
                            <button class="pay-period-btn" id="btnPeriodCustom">Custom</button>
                            <span class="ms-3 text-muted" id="payPeriodDisplay"></span>
                        </div>
                        <div id="customPeriodRange" class="mt-2 gap-2 align-items-center">
                            <input type="date" class="form-control form-control-sm" id="customPeriodStart" style="width: 160px;">
                            <span>to</span>
                            <input type="date" class="form-control form-control-sm" id="customPeriodEnd" style="width: 160px;">
                            <button class="btn btn-sm btn-primary" id="btnApplyCustomPeriod">Apply</button>
                        </div>
                    </div>
                </div>

                <!-- Skeleton -->
                <div id="payrollSkeleton" style="display: none;">
                    <div class="card mb-3"><div class="card-body">
                        <div class="skeleton" style="height: 50px; width: 100%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 50px; width: 100%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 50px; width: 100%;"></div>
                    </div></div>
                    <div class="card"><div class="card-body">
                        <div class="skeleton" style="height: 30px; width: 40%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%;"></div>
                    </div></div>
                </div>

                <!-- Payroll Content -->
                <div id="payrollContent" style="display: none;">
                    <!-- Driver Payroll -->
                    <h5 class="mb-3"><i class="bi bi-truck"></i> Driver Payroll</h5>
                    <div id="driverPayrollContainer"></div>

                    <!-- Staff Pay -->
                    <h5 class="mt-4 mb-3"><i class="bi bi-people"></i> Staff Pay</h5>
                    <div class="card">
                        <div class="card-body p-0">
                            <div id="staffPayContainer"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ==================== TAB 3: INVOICING ==================== -->
            <div class="tab-pane fade" id="pane-invoicing" role="tabpanel">
                <!-- Skeleton -->
                <div id="invoicingSkeleton" style="display: none;">
                    <div class="card mb-3"><div class="card-body">
                        <div class="skeleton" style="height: 60px; width: 100%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 60px; width: 100%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 60px; width: 100%;"></div>
                    </div></div>
                    <div class="card"><div class="card-body">
                        <div class="skeleton" style="height: 30px; width: 30%; margin-bottom: 12px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 40px; width: 100%;"></div>
                    </div></div>
                </div>

                <!-- Invoicing Content -->
                <div id="invoicingContent" style="display: none;">
                    <!-- Uninvoiced Appointments -->
                    <h5 class="mb-3"><i class="bi bi-receipt-cutoff"></i> Approved &mdash; Ready to Invoice</h5>
                    <div id="uninvoicedContainer" class="mb-4"></div>

                    <!-- Created Invoices -->
                    <h5 class="mb-3"><i class="bi bi-file-earmark-text"></i> Invoices</h5>
                    <div class="card">
                        <div class="card-body p-0">
                            <div id="invoicesListContainer"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== MODALS ==================== -->

    <!-- Create Invoice Modal -->
    <div class="modal fade" id="createInvoiceModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-file-earmark-plus"></i> Create Invoice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Client</label>
                            <input type="text" class="form-control" id="invoiceClientName" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Invoice Date</label>
                            <input type="date" class="form-control" id="invoiceDate">
                        </div>
                    </div>

                    <h6>Appointments</h6>
                    <div id="invoiceAppointmentsList" class="mb-3" style="max-height: 300px; overflow-y: auto;"></div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Notes (optional)</label>
                            <textarea class="form-control" id="invoiceNotes" rows="2"></textarea>
                        </div>
                        <div class="col-md-6">
                            <div class="bg-light p-3 rounded">
                                <div class="d-flex justify-content-between mb-1">
                                    <span>Subtotal:</span>
                                    <strong id="invoiceSubtotal">$0.00</strong>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <span id="invoiceHstLabel">HST (14%):</span>
                                    <span id="invoiceTax">$0.00</span>
                                </div>
                                <hr class="my-2">
                                <div class="d-flex justify-content-between">
                                    <strong>Total:</strong>
                                    <strong id="invoiceTotal" class="text-primary">$0.00</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="confirmCreateInvoice">
                        <i class="bi bi-check-lg"></i> Create Invoice
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Date Picker Modal -->
    <div class="modal fade" id="datePickerModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="datePickerTitle">Select Date</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted" id="datePickerDescription"></p>
                    <input type="date" class="form-control" id="datePickerInput">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary btn-sm" id="datePickerConfirm">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Staff Mileage Modal -->
    <div class="modal fade" id="addMileageModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-speedometer"></i> Add Mileage</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="fw-bold mb-3" id="mileageStaffName"></p>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" id="mileageDate">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kilometers</label>
                        <input type="number" class="form-control" id="mileageKm" step="0.1" min="0" placeholder="e.g. 45.2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="mileageDescription" rows="2" placeholder="e.g. Client visit K1234"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary btn-sm" id="btnSaveMileage">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF Preview Modal -->
    <div class="modal fade" id="pdfPreviewModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
